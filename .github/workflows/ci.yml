name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore tests/MongrelDB.Tests/MongrelDB.Tests.csproj

      - name: Build
        run: dotnet build tests/MongrelDB.Tests/MongrelDB.Tests.csproj --configuration Release --no-restore

      - name: Offline tests (no daemon)
        # Runs the suite without a daemon; the live tests self-skip and the
        # offline tests (health-when-unreachable, auth header) run normally.
        run: dotnet test tests/MongrelDB.Tests/MongrelDB.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal"

  live:
    # Boots a real mongreldb-server and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.53.3'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore tests/MongrelDB.Tests/MongrelDB.Tests.csproj

      - name: Build
        run: dotnet build tests/MongrelDB.Tests/MongrelDB.Tests.csproj --configuration Release --no-restore

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          # Wait for the daemon to become healthy (max ~30s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        run: dotnet test tests/MongrelDB.Tests/MongrelDB.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal"

      # Each example is a top-level-statements Program.cs; compile and run each
      # in its own throwaway console project that references the client.
      - name: Run examples
        run: |
          mkdir -p /tmp/ex-runner && cd /tmp/ex-runner
          for f in "$GITHUB_WORKSPACE"/examples/*.cs; do
            name=$(basename "$f" .cs)
            # Skip examples that need the native embedded engine; they are
            # exercised in the native job where libmongreldb*.so are present.
            if grep -q 'Visorcraft\.MongrelDB\.Native' "$f"; then
              echo "=== Skipping $name (requires native libs) ==="
              continue
            fi
            echo "=== Running $name ==="
            rm -rf "$name"
            mkdir -p "$name" && cd "$name"
            dotnet new console --force
            dotnet add reference "$GITHUB_WORKSPACE/MongrelDB.csproj"
            cp "$f" Program.cs
            dotnet run --force || { echo "FAILED: $name"; exit 1; }
            cd /tmp/ex-runner
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi

  native:
    # Builds the native P/Invoke project and runs its tests against the
    # prebuilt libmongreldb + libmongreldb_kit from the engine releases.
    name: Native embedding tests
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.53.3'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Download the prebuilt native libraries for linux-x64 and place them
      # under the runtimes/linux-x64/native/ directory so the .NET runtime
      # loader finds them automatically.
      - name: Download native libraries
        run: |
          mkdir -p runtimes/linux-x64/native
          curl -fsSL -o /tmp/core.tar.gz \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-native-linux-x64-gnu.tar.gz"
          tar xzf /tmp/core.tar.gz -C /tmp --strip-components=1
          cp /tmp/lib/libmongreldb.so runtimes/linux-x64/native/

          curl -fsSL -o /tmp/kit.tar.gz \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-kit-native-linux-x64-gnu.tar.gz"
          mkdir -p /tmp/kit
          tar xzf /tmp/kit.tar.gz -C /tmp/kit --strip-components=1
          cp /tmp/kit/lib/libmongreldb_kit.so runtimes/linux-x64/native/

      - name: Build
        run: dotnet build tests/MongrelDB.Native.Tests/MongrelDB.Native.Tests.csproj --configuration Release

      - name: Run native tests
        run: dotnet test tests/MongrelDB.Native.Tests/MongrelDB.Native.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal"
        env:
          MONGRELDB_NATIVE_DIR: ${{ github.workspace }}/runtimes/linux-x64/native
